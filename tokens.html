<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokens - Tempo Pump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #090909;
      --bg-soft: #111211;
      --panel: #171917;
      --panel-2: #1d1f1d;
      --line: rgba(255,255,255,0.07);
      --text: #f2f5ef;
      --muted: #879082;
      --green: #8dff55;
      --green-soft: rgba(141,255,85,0.12);
      --green-line: rgba(141,255,85,0.18);
      --shadow: 0 18px 40px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(141,255,85,0.05), transparent 24%), linear-gradient(180deg, #070807 0%, #0a0b0a 100%);
    }
    h1, h2, h3 { font-family: "Space Grotesk", sans-serif; letter-spacing: -0.03em; }
    .app { display: grid; grid-template-columns: 208px minmax(0, 1fr); min-height: 100vh; }
    .sidebar {
      position: sticky; top: 0; height: 100vh; padding: 18px 14px; background: rgba(10,11,10,0.95);
      border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; padding: 8px 8px 14px; font-family: "Space Grotesk", sans-serif;
      font-size: 24px; font-weight: 700;
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #acff84, #84ea4e); color: #071005;
    }
    .nav { display: grid; gap: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; min-height: 46px; padding: 0 12px; border-radius: 12px;
      color: #d9dfd5;
    }
    .nav-item.active { background: rgba(255,255,255,0.05); color: var(--green); }
    .nav-item:hover { background: rgba(255,255,255,0.04); }
    .nav-icon { width: 18px; text-align: center; }
    .nav-label { font-size: 15px; font-weight: 600; }
    .sidebar-foot {
      margin-top: auto; padding: 12px; border-radius: 14px; background: var(--panel); border: 1px solid var(--line);
    }
    .wallet-btn {
      width: 100%; min-height: 44px; border: none; border-radius: 12px; background: linear-gradient(135deg, #acff84, #84ea4e);
      color: #081006; font-size: 14px; font-weight: 900; cursor: pointer;
    }
    .network-badge {
      display: none; margin-top: 10px; min-height: 34px; align-items: center; justify-content: center; border-radius: 10px;
      background: var(--green-soft); border: 1px solid var(--green-line); color: #c3ffab; font-size: 12px; font-weight: 700;
    }
    .network-badge.show { display: flex; }
    .main { min-width: 0; }
    .ticker-bar {
      position: sticky; top: 0; z-index: 12; min-height: 42px; display: flex; align-items: center; overflow: hidden;
      background: rgba(9,10,9,0.95); border-bottom: 1px solid var(--line);
    }
    #tickerTrack { display: flex; align-items: center; gap: 12px; min-width: max-content; padding: 0 14px; white-space: nowrap; }
    .ticker-chip {
      display: inline-flex; align-items: center; min-height: 24px; padding: 0 9px; border-radius: 8px; background: var(--panel-2);
      border: 1px solid var(--line); color: #edf2e9; font-size: 11px; font-weight: 700;
    }
    .ticker-chip.buy { color: #dfffd0; border-color: rgba(141,255,85,0.18); }
    .ticker-chip.sell { color: #f3f0cf; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 20px 0; }
    .pill {
      min-height: 40px; padding: 0 14px; border-radius: 999px; display: inline-flex; align-items: center; background: var(--panel);
      border: 1px solid var(--line); color: var(--text); font-size: 13px; font-weight: 700;
    }
    .page { padding: 18px 20px 28px; }
    .panel {
      background: linear-gradient(180deg, var(--panel), #151615); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow);
    }
    .token-panel { padding: 18px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .section-title { font-size: 30px; font-weight: 700; }
    .section-copy { color: var(--muted); font-size: 13px; line-height: 1.7; }
    .toolbar {
      display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search-wrap {
      display: grid; grid-template-columns: minmax(0, 1fr) 96px; width: min(520px, 100%); border-radius: 14px; overflow: hidden;
      border: 1px solid var(--line); background: var(--panel);
    }
    .search-input {
      min-height: 46px; border: none; background: transparent; color: var(--text); padding: 0 14px; font-size: 14px; outline: none;
    }
    .search-btn, .sort-btn {
      min-height: 44px; padding: 0 16px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2);
      color: var(--text); font-size: 14px; font-weight: 800; cursor: pointer;
    }
    .search-btn {
      border: none; border-left: 1px solid var(--line); border-radius: 0;
    }
    .token-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .token-card {
      display: block; padding: 12px; border-radius: 12px; background: var(--bg-soft); border: 1px solid var(--line);
      transition: transform 160ms ease, border-color 160ms ease;
    }
    .token-card:hover { transform: translateY(-1px); border-color: var(--green-line); }
    .token-body { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .token-media {
      width: 100%; height: 132px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #20231f, #121412); border: 1px solid var(--line); color: var(--green); font-size: 28px; font-weight: 900;
    }
    .token-title-row { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .token-title { font-size: 16px; font-weight: 800; line-height: 1.2; }
    .token-sub { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 700; }
    .rank-pill {
      display: inline-flex; align-items: center; min-height: 24px; padding: 0 8px; border-radius: 999px; background: var(--green-soft);
      border: 1px solid var(--green-line); color: var(--green); font-size: 12px; font-weight: 800; white-space: nowrap;
    }
    .token-meta-list { display: grid; gap: 6px; margin-top: 8px; }
    .metric-row {
      display: flex; justify-content: space-between; gap: 8px; min-height: 34px; padding: 0 10px; align-items: center; border-radius: 8px;
      background: var(--panel); color: var(--muted); font-size: 13px;
    }
    .metric-row span:last-child { color: var(--text); font-weight: 700; }
    .token-progress { margin-top: 10px; }
    .progress-track {
      height: 10px; border-radius: 999px; background: #0a0b0a; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
    }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #78db44, #aaff7d); }
    .token-progress-meta {
      display: flex; justify-content: space-between; gap: 8px; margin-top: 6px; color: var(--green); font-size: 11px; font-weight: 800;
    }
    .empty-state {
      min-height: 220px; border-radius: 14px; border: 1px dashed var(--line); background: var(--bg-soft); display: flex; align-items: center;
      justify-content: center; color: var(--muted); font-size: 14px;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
    }
    @media (max-width: 760px) {
      .page, .topbar { padding-left: 14px; padding-right: 14px; }
      .toolbar { align-items: stretch; }
      .toolbar-left, .toolbar-right { width: 100%; }
      .search-wrap { width: 100%; grid-template-columns: 1fr; }
      .search-btn { border-left: none; border-top: 1px solid var(--line); }
      .token-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .token-media { height: 150px; }
    }
    @media (max-width: 560px) {
      .token-grid { grid-template-columns: 1fr; }
      .token-media { height: 180px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <span>TEMPO</span>
      </div>

      <nav class="nav">
        <a href="/" class="nav-item">
          <span class="nav-icon">⌂</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="/tokens" class="nav-item active">
          <span class="nav-icon">▦</span>
          <span class="nav-label">Tokens</span>
        </a>
        <a href="/rules" class="nav-item">
          <span class="nav-icon">≡</span>
          <span class="nav-label">Rules</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <button onclick="connectWallet()" id="connectBtn" class="wallet-btn">Connect Wallet</button>
        <div id="networkBadge" class="network-badge">Tempo Mainnet</div>
      </div>
    </aside>

    <main class="main">
      <div class="ticker-bar">
        <div id="tickerTrack">
          <span id="tickerContent" class="ticker-chip">Loading live trades...</span>
          <span id="tickerContent2" aria-hidden="true"></span>
        </div>
      </div>

      <div class="topbar">
        <div class="pill">Tokens</div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="pill" id="walletPreview">Wallet not connected</div>
        </div>
      </div>

      <div class="page">
        <section class="panel token-panel">
          <div class="section-head">
            <div class="section-title">Created Tokens</div>
            <button onclick="loadTokenList()" class="sort-btn">Refresh</button>
          </div>

          <div class="toolbar">
            <div class="toolbar-left">
              <div class="search-wrap">
                <input id="marketSearch" class="search-input" placeholder="Search by name, symbol, or address" oninput="filterTokenList()">
                <button class="search-btn" onclick="filterTokenList()">Search</button>
              </div>
            </div>
            <div class="toolbar-right">
              <button class="sort-btn" id="sortLatestBtn" onclick="setSort('latest')">Latest</button>
              <button class="sort-btn" id="sortMarketBtn" onclick="setSort('marketcap')">Market Cap</button>
            </div>
          </div>

          <div id="tokenList" class="token-grid">
            <div class="empty-state">No tokens yet.</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    let provider, signer, userAddress;
    let allCards = [];
    let currentSort = "latest";
    const LAUNCH_CONTRACT = "0x6C29C8D23600Fb0487436EEB8B22c082f59d9574";
    const TEMPO_CHAIN = {
      chainId: "0x1079",
      chainName: "Tempo Mainnet",
      nativeCurrency: { name: "USD", symbol: "USD", decimals: 18 },
      rpcUrls: ["https://rpc.tempo.xyz"],
      blockExplorerUrls: ["https://explore.mainnet.tempo.xyz"]
    };
    const LAUNCH_ABI = [
      "function getLaunchCount() view returns (uint256)",
      "function allLaunches(uint256) view returns (address)",
      "function launches(address) view returns (address creator, uint256 raised, uint256 sold, bool graduated)",
      "function getPrice(address tokenAddr) view returns (uint256)",
      "event LaunchCreated(address indexed token, address indexed creator, string name, string symbol, string meta)",
      "event TokenBought(address indexed token, address indexed buyer, uint256 usdcIn, uint256 tokensOut)",
      "event TokenSold(address indexed token, address indexed seller, uint256 tokensIn, uint256 usdcOut)"
    ];

    async function autoConnect() {
      if (!window.ethereum) return;
      try {
        await connectWallet(false);
      } catch (e) {}
    }

    async function connectWallet(requestAccess = true) {
      if (!window.ethereum) return;
      try {
        const accounts = await window.ethereum.request({
          method: requestAccess ? "eth_requestAccounts" : "eth_accounts"
        });
        if (!accounts.length) return;
        const currentChainId = await window.ethereum.request({ method: "eth_chainId" });
        if (currentChainId !== TEMPO_CHAIN.chainId) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: TEMPO_CHAIN.chainId }]
            });
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [TEMPO_CHAIN]
              });
            } else {
              throw switchErr;
            }
          }
        }
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        document.getElementById("connectBtn").textContent = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("walletPreview").textContent = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("networkBadge").classList.add("show");
      } catch (e) {
        console.error(e);
      }
    }

    function setSort(type) {
      currentSort = type;
      document.getElementById("sortLatestBtn").style.borderColor = type === "latest" ? "rgba(141,255,85,0.18)" : "";
      document.getElementById("sortMarketBtn").style.borderColor = type === "marketcap" ? "rgba(141,255,85,0.18)" : "";
      filterTokenList();
    }

    function sortCards(cards) {
      const cloned = [...cards];
      if (currentSort === "marketcap") cloned.sort((a, b) => b.marketCapValue - a.marketCapValue);
      else cloned.sort((a, b) => b.createdBlock - a.createdBlock);
      return cloned;
    }

    function renderTokenList(cards) {
      const tokenListEl = document.getElementById("tokenList");
      if (!cards.length) {
        tokenListEl.innerHTML = "<div class='empty-state'>No matching tokens found.</div>";
        return;
      }
      tokenListEl.innerHTML = cards.map((c) => `
        <a href="/token?token=${c.tokenAddr}" class="token-card">
          <div class="token-body">
            <div class="token-media">
              ${c.meta && c.meta.image
                ? `<img src="${c.meta.image}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='${c.symbol.slice(0,2).toUpperCase()}'">`
                : c.symbol.slice(0,2).toUpperCase()}
            </div>
            <div>
              <div class="token-title-row">
                <div>
                  <div class="token-title">${c.name}</div>
                  <div class="token-sub">${c.symbol}</div>
                </div>
                <div class="rank-pill">${c.marketCapLabel}</div>
              </div>
              <div class="token-meta-list">
                <div class="metric-row"><span>Creator</span><span class="mono">${c.creatorShort}</span></div>
                <div class="metric-row"><span>Price</span><span>${c.priceFormatted} USDC</span></div>
              </div>
              <div class="token-progress">
                <div class="progress-track"><div class="progress-fill" style="width:${c.progress}%"></div></div>
                <div class="token-progress-meta">
                  <span>${c.progress}%</span>
                  <span>Curve Progress</span>
                </div>
              </div>
            </div>
          </div>
        </a>
      `).join("");
    }

    function filterTokenList() {
      const q = (document.getElementById("marketSearch").value || "").trim().toLowerCase();
      let cards = [...allCards];
      if (q) {
        cards = cards.filter((c) =>
          c.name.toLowerCase().includes(q) ||
          c.symbol.toLowerCase().includes(q) ||
          c.tokenAddr.toLowerCase().includes(q)
        );
      }
      renderTokenList(sortCards(cards));
    }

    async function loadTokenList() {
      try {
        const p = new ethers.JsonRpcProvider("https://rpc.tempo.xyz");
        const launch = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, p);
        const count = Number(await launch.getLaunchCount());
        const tokenListEl = document.getElementById("tokenList");
        if (count === 0) {
          tokenListEl.innerHTML = "<div class='empty-state'>No tokens yet.</div>";
          return;
        }
        tokenListEl.innerHTML = "<div class='empty-state'>Loading on-chain data...</div>";
        const cards = [];
        for (let i = 0; i < count; i++) {
          try {
            const tokenAddr = await launch.allLaunches(i);
            const token = new ethers.Contract(tokenAddr, [
              "function name() view returns (string)",
              "function symbol() view returns (string)",
              "function totalSupply() view returns (uint256)"
            ], p);
            const [name, symbol, info, price, totalSupply] = await Promise.all([
              token.name(),
              token.symbol(),
              launch.launches(tokenAddr),
              launch.getPrice(tokenAddr),
              token.totalSupply()
            ]);
            const eventMeta = await findLaunchMeta(launch, p, tokenAddr);
            const localMeta = getLocalMeta(tokenAddr);
            const meta = eventMeta || localMeta || {};
            const raised = Number(ethers.formatUnits(info[1], 6));
            const priceValue = Number(price) / 1e6;
            const supplyValue = Number(ethers.formatUnits(totalSupply, 18));
            const marketCapValue = priceValue * supplyValue;
            cards.push({
              tokenAddr,
              name,
              symbol,
              raised,
              priceFormatted: priceValue.toFixed(8),
              progress: Math.min((raised / 12000) * 100, 100).toFixed(1),
              creatorShort: info[0].slice(0, 4) + "..." + info[0].slice(-6),
              marketCapValue,
              marketCapLabel: "$" + marketCapValue.toLocaleString(undefined, { maximumFractionDigits: 0 }),
              createdBlock: i + 1,
              meta
            });
          } catch (e) {
            console.error(e);
          }
        }
        allCards = cards;
        filterTokenList();
      } catch (e) {
        console.error(e);
      }
    }

    async function loadTicker() {
      try {
        const p = new ethers.JsonRpcProvider("https://rpc.tempo.xyz");
        const launch = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, p);
        const latestBlock = await p.getBlockNumber();
        const fromBlock = Math.max(0, latestBlock - 5000);
        const [buyEvents, sellEvents] = await Promise.all([
          launch.queryFilter(launch.filters.TokenBought(), fromBlock, latestBlock),
          launch.queryFilter(launch.filters.TokenSold(), fromBlock, latestBlock)
        ]);
        const allEvents = [...buyEvents, ...sellEvents]
          .sort((a, b) => b.blockNumber - a.blockNumber)
          .slice(0, 8);

        const ticker1 = document.getElementById("tickerContent");
        const ticker2 = document.getElementById("tickerContent2");
        const track = document.getElementById("tickerTrack");

        if (!allEvents.length) {
          ticker1.innerHTML = '<span class="ticker-chip">No live trades yet</span>';
          ticker2.innerHTML = "";
          track.style.animation = "none";
          return;
        }

        const symbolCache = {};
        for (const ev of allEvents) {
          const tokenAddr = ev.args[0];
          if (!symbolCache[tokenAddr]) {
            try {
              const token = new ethers.Contract(tokenAddr, ["function symbol() view returns (string)"], p);
              symbolCache[tokenAddr] = await token.symbol();
            } catch (e) {
              symbolCache[tokenAddr] = tokenAddr.slice(0, 6);
            }
          }
        }

        function formatTickerAmount(value) {
          if (value >= 1000000) return `${(value / 1000000).toFixed(2).replace(/\.?0+$/, "")}M`;
          if (value >= 1000) return `${(value / 1000).toFixed(2).replace(/\.?0+$/, "")}K`;
          if (value >= 1) return value.toFixed(2).replace(/\.?0+$/, "");
          return value.toFixed(4).replace(/\.?0+$/, "");
        }

        const items = allEvents.map((ev) => {
          const isBuy = ev.fragment.name === "TokenBought";
          const wallet = ev.args[1].slice(0, 6) + "..." + ev.args[1].slice(-3);
          const usdcValue = isBuy
            ? Number(ethers.formatUnits(ev.args[2], 6))
            : Number(ethers.formatUnits(ev.args[3], 6));
          const symbol = symbolCache[ev.args[0]] || "TOKEN";
          return `<span class="ticker-chip ${isBuy ? "buy" : "sell"}">${wallet} ${isBuy ? "bought" : "sold"} ${formatTickerAmount(usdcValue)} USDC ${symbol}</span>`;
        });

        const html = items.join("");
        ticker1.innerHTML = html;
        ticker2.innerHTML = html;
        const width = ticker1.scrollWidth;
        track.style.animation = width > window.innerWidth ? `ticker ${Math.max(36, width / 45)}s linear infinite` : "none";
      } catch (e) {
        console.error(e);
      }
    }

    window.addEventListener("load", () => {
      autoConnect();
      loadTicker();
      loadTokenList();
      setInterval(loadTicker, 30000);
    });

    function getLocalMeta(tokenAddr) {
      try {
        const raw = localStorage.getItem(`tempo_meta_${tokenAddr.toLowerCase()}`);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    async function findLaunchMeta(launch, provider, tokenAddr) {
      try {
        const latestBlock = await provider.getBlockNumber();
        const chunkSize = 100000;
        const filter = launch.filters.LaunchCreated(tokenAddr);
        for (let toBlock = latestBlock; toBlock >= 0; toBlock -= chunkSize) {
          const fromBlock = Math.max(0, toBlock - chunkSize + 1);
          const events = await launch.queryFilter(filter, fromBlock, toBlock);
          if (events.length > 0) {
            const metaText = events[events.length - 1].args.meta;
            if (!metaText) return null;
            try {
              return JSON.parse(metaText);
            } catch (e) {
              return null;
            }
          }
          if (fromBlock === 0) break;
        }
      } catch (e) {
        console.error("findLaunchMeta error", e);
      }
      return null;
    }

    if (window.ethereum) {
      window.ethereum.on("accountsChanged", (accounts) => {
        if (accounts.length > 0) connectWallet(false);
        else {
          userAddress = null;
          signer = null;
          document.getElementById("connectBtn").textContent = "Connect Wallet";
          document.getElementById("walletPreview").textContent = "Wallet not connected";
          document.getElementById("networkBadge").classList.remove("show");
        }
      });
      window.ethereum.on("chainChanged", () => window.location.reload());
    }
  </script>
</body>
</html>
