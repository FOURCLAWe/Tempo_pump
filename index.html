<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo Launch 测试平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); color: white; font-family: 'Inter', sans-serif; }
    .card { background: rgba(30, 41, 55, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    .btn-primary { background: linear-gradient(to right, #a855f7, #22d3ee); }
    .btn-buy { background: linear-gradient(to right, #10b981, #059669); }
    .progress-bar { height: 8px; background: #1e2937; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(to right, #a855f7, #22d3ee); border-radius: 999px; transition: width 0.5s ease; }
    input:focus { outline: none; border-color: #a855f7; }
    .log-entry { border-left: 2px solid #a855f7; padding-left: 8px; margin-bottom: 6px; }
  </style>
</head>
<body class="min-h-screen p-6">

  <!-- Header -->
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">Tempo Launch</h1>
        <p class="text-gray-400 text-sm mt-1">Fair Launch Platform on Tempo Chain</p>
      </div>
      <div class="flex items-center gap-4">
        <div id="networkBadge" class="hidden bg-green-500/20 text-green-400 px-4 py-1.5 rounded-full text-xs font-medium">Tempo Chain</div>
        <button onclick="connectWallet()" id="connectBtn"
                class="btn-primary px-6 py-2.5 rounded-2xl text-sm font-semibold hover:brightness-110 transition">
          连接钱包
        </button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="card rounded-2xl p-5 text-center">
        <div class="text-3xl font-black text-purple-400" id="totalLaunches">0</div>
        <div class="text-gray-400 text-sm mt-1">已发射项目</div>
      </div>
      <div class="card rounded-2xl p-5 text-center">
        <div class="text-3xl font-black text-cyan-400" id="totalRaised">$0</div>
        <div class="text-gray-400 text-sm mt-1">总募集 USDC</div>
      </div>
      <div class="card rounded-2xl p-5 text-center">
        <div class="text-3xl font-black text-green-400" id="graduated">0</div>
        <div class="text-gray-400 text-sm mt-1">已毕业项目</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- 左侧：创建项目 -->
      <div class="card rounded-3xl p-8">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
          <span class="w-8 h-8 bg-purple-500/20 rounded-lg flex items-center justify-center text-purple-400 text-sm">🚀</span>
          创建新发射项目
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">代币名称</label>
            <input id="name" placeholder="如: PepeTempo" 
                   class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">代币符号</label>
            <input id="symbol" placeholder="如: PTEMPO" 
                   class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm">
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1.5">合约地址（已部署）</label>
            <input id="contractAddr" placeholder="0x..." 
                   class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm font-mono">
          </div>
          <button onclick="createLaunch()" 
                  class="w-full btn-primary py-3.5 rounded-xl font-bold text-sm hover:brightness-110 transition">
            立即创建发射
          </button>
        </div>

        <!-- 曲线信息 -->
        <div class="mt-6 bg-slate-900 rounded-2xl p-5">
          <h3 class="text-sm font-semibold mb-3 text-gray-300">曲线参数</h3>
          <div class="space-y-2 text-xs text-gray-400">
            <div class="flex justify-between"><span>初始市值</span><span class="text-white">~$4,000</span></div>
            <div class="flex justify-between"><span>打满所需</span><span class="text-white">12,000 USDC</span></div>
            <div class="flex justify-between"><span>毕业市值</span><span class="text-white">~$65,000</span></div>
            <div class="flex justify-between"><span>平台手续费</span><span class="text-white">1%</span></div>
            <div class="flex justify-between"><span>曲线类型</span><span class="text-purple-400">改进型指数曲线</span></div>
          </div>
        </div>
      </div>

      <!-- 右侧：购买与进度 -->
      <div class="space-y-6">

        <!-- 购买区 -->
        <div class="card rounded-3xl p-8">
          <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-8 h-8 bg-green-500/20 rounded-lg flex items-center justify-center text-green-400 text-sm">💰</span>
            购买代币
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-xs text-gray-400 mb-1.5">代币地址</label>
              <input id="tokenAddr" placeholder="0x..." 
                     class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm font-mono">
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1.5">购买数量 (USDC)</label>
              <input id="usdcAmount" type="number" value="100" 
                     oninput="updatePriceEstimate()"
                     class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            </div>
            <div class="bg-slate-900 rounded-xl p-4 text-xs space-y-2">
              <div class="flex justify-between">
                <span class="text-gray-400">当前价格</span>
                <span class="text-cyan-400" id="currentPrice">-.--</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-400">预计获得</span>
                <span class="text-green-400" id="estimatedTokens">-.--</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-400">手续费 (1%)</span>
                <span class="text-yellow-400" id="feeAmount">-.--</span>
              </div>
            </div>
            <button onclick="buyTokens()" 
                    class="w-full btn-buy py-3.5 rounded-xl font-bold text-sm hover:brightness-110 transition">
              购买代币
            </button>
          </div>
        </div>

        <!-- 募集进度 -->
        <div class="card rounded-3xl p-6">
          <h3 class="text-sm font-semibold mb-4">募集进度</h3>
          <div class="progress-bar mb-2">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="flex justify-between text-xs text-gray-400">
            <span id="raisedAmt">$0 募集</span>
            <span>目标 $12,000</span>
          </div>
        </div>

      </div>
    </div>

    <!-- 日志区 -->
    <div class="mt-6 card rounded-3xl p-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-sm font-semibold">操作日志</h3>
        <button onclick="clearLog()" class="text-xs text-gray-500 hover:text-gray-300">清空</button>
      </div>
      <div id="logArea" class="text-xs font-mono min-h-[120px] max-h-[200px] overflow-auto space-y-1">
        <div class="text-gray-500">等待操作...</div>
      </div>
    </div>

  </div>

  <script>
    let provider, signer, userAddress;
    const USDC_ADDRESS = "0x20c000000000000000000000b9537d11c60e8b50";
    const LAUNCH_CONTRACT = "0x6ed41d12DB718972923Fd9E7e3271888a70B9E2c";
    
    const LAUNCH_ABI = [
      "function createLaunch(string name, string symbol) returns (address)",
      "function buy(address tokenAddr, uint256 usdcAmount)",
      "function getPrice(address tokenAddr) view returns (uint256)",
      "function launches(address) view returns (address token, address creator, uint256 raised, bool graduated)",
      "function getLaunchCount() view returns (uint256)",
      "event LaunchCreated(address indexed token, address indexed creator, string name)",
      "event TokenBought(address indexed token, address indexed buyer, uint256 usdcIn, uint256 tokensOut)",
      "event LaunchGraduated(address indexed token)"
    ];
    
    const USDC_ABI = [
      "function approve(address spender, uint256 amount) returns (bool)",
      "function allowance(address owner, address spender) view returns (uint256)",
      "function balanceOf(address) view returns (uint256)"
    ];
    let simulatedRaised = 0;
    const TARGET = 12000;

    const TEMPO_CHAIN = {
      chainId: "0x1079", // 4217 in hex
      chainName: "Tempo",
      nativeCurrency: { name: "pathUSD", symbol: "pathUSD", decimals: 18 },
      rpcUrls: ["https://rpc.tempo.xyz"],
      blockExplorerUrls: ["https://explorer.tempo.xyz"]
    };

    async function connectWallet() {
      if (!window.ethereum) return log("请安装 MetaMask 或其他 EVM 钱包", "red");
      try {
        // 请求连接钱包
        await window.ethereum.request({ method: "eth_requestAccounts" });

        // 尝试切换到 Tempo Chain
        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: TEMPO_CHAIN.chainId }]
          });
        } catch (switchErr) {
          // 如果链不存在，自动添加
          if (switchErr.code === 4902) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [TEMPO_CHAIN]
            });
          } else {
            throw switchErr;
          }
        }

        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("connectBtn").innerHTML =
          `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        document.getElementById("networkBadge").classList.remove("hidden");
        log(`✅ 钱包已连接: ${userAddress}`, "green");
        log(`✅ 已切换到 Tempo Chain (ChainID: 4217)`, "green");
      } catch(e) {
        log(`❌ 连接失败: ${e.message}`, "red");
      }
    }

    async function createLaunch() {
      const name = document.getElementById("name").value;
      const symbol = document.getElementById("symbol").value;
      if (!name || !symbol) return log("❌ 请填写代币名称和符号", "red");
      if (!userAddress) return log("❌ 请先连接钱包", "red");
      try {
        log(`🚀 正在创建发射: ${name} (${symbol})...`);
        const contract = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, signer);
        const tx = await contract.createLaunch(name, symbol);
        log(`⏳ 交易已发送: ${tx.hash}`);
        const receipt = await tx.wait();
        // 从事件中获取代币地址
        const iface = new ethers.Interface(LAUNCH_ABI);
        let tokenAddr = '';
        for (const log2 of receipt.logs) {
          try {
            const parsed = iface.parseLog(log2);
            if (parsed.name === 'LaunchCreated') {
              tokenAddr = parsed.args.token;
            }
          } catch(e) {}
        }
        log(`✅ 代币地址: ${tokenAddr}`, "green");
        log(`✅ 项目创建成功！`, "green");
        document.getElementById("tokenAddr").value = tokenAddr;
        await refreshStats();
      } catch(e) {
        log(`❌ 创建失败: ${e.message}`, "red");
      }
    }

    async function buyTokens() {
      const tokenAddr = document.getElementById("tokenAddr").value;
      const amount = parseFloat(document.getElementById("usdcAmount").value);
      if (!tokenAddr) return log("❌ 请填写代币地址", "red");
      if (!amount || amount <= 0) return log("❌ 请输入购买数量", "red");
      if (!userAddress) return log("❌ 请先连接钱包", "red");
      try {
        const usdcAmount = ethers.parseUnits(amount.toString(), 6);
        const usdc = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const launch = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, signer);
        
        // 检查 allowance
        const allowance = await usdc.allowance(userAddress, LAUNCH_CONTRACT);
        if (allowance < usdcAmount) {
          log(`🔓 正在 approve USDC...`);
          const approveTx = await usdc.approve(LAUNCH_CONTRACT, usdcAmount);
          await approveTx.wait();
          log(`✅ Approve 成功`, "green");
        }
        
        log(`💰 正在购买 ${amount} USDC 的代币...`);
        const tx = await launch.buy(tokenAddr, usdcAmount);
        log(`⏳ 交易已发送: ${tx.hash}`);
        await tx.wait();
        log(`✅ 购买成功！`, "green");
        await refreshLaunchInfo(tokenAddr);
        await refreshStats();
      } catch(e) {
        log(`❌ 购买失败: ${e.message}`, "red");
      }
    }

    async function refreshLaunchInfo(tokenAddr) {
      try {
        const launch = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, provider);
        const info = await launch.launches(tokenAddr);
        const raised = Number(ethers.formatUnits(info.raised, 6));
        simulatedRaised = raised;
        updateProgress();
        document.getElementById("totalRaised").textContent = `$${raised.toFixed(0)}`;
        if (info.graduated) {
          log(`🎓 项目已毕业！`, "purple");
        }
      } catch(e) {}
    }

    async function refreshStats() {
      try {
        const launch = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, provider);
        const count = await launch.getLaunchCount();
        document.getElementById("totalLaunches").textContent = count.toString();
      } catch(e) {}
    }

    function getCurrentSimPrice() {
      if (simulatedRaised === 0) return 1e12;
      const progress = simulatedRaised / TARGET;
      return 1e12 + (progress ** 2) * 1e18 / 7e10;
    }

    function updatePriceEstimate() {
      const amount = parseFloat(document.getElementById("usdcAmount").value) || 0;
      const fee = amount * 0.01;
      const afterFee = amount - fee;
      const price = getCurrentSimPrice();
      const tokens = (afterFee * 1e18 / price).toFixed(2);
      document.getElementById("currentPrice").textContent = 
        (price / 1e12).toFixed(6) + " USDC";
      document.getElementById("estimatedTokens").textContent = 
        Number(tokens).toLocaleString() + " 代币";
      document.getElementById("feeAmount").textContent = 
        fee.toFixed(2) + " USDC";
    }

    function updateProgress() {
      const pct = Math.min((simulatedRaised / TARGET) * 100, 100).toFixed(1);
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("raisedAmt").textContent = 
        `$${simulatedRaised.toFixed(0)} 募集`;
    }

    function log(msg, color = "gray") {
      const logArea = document.getElementById("logArea");
      const time = new Date().toLocaleTimeString();
      const colorMap = {
        gray: "text-gray-400", green: "text-green-400",
        red: "text-red-400", purple: "text-purple-400"
      };
      logArea.innerHTML += `
        <div class="log-entry ${colorMap[color] || 'text-gray-400'}">
          <span class="text-gray-600">[${time}]</span> ${msg}
        </div>`;
      logArea.scrollTop = logArea.scrollHeight;
    }

    function clearLog() {
      document.getElementById("logArea").innerHTML = 
        "<div class='text-gray-500'>日志已清空</div>";
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // 初始化
    updatePriceEstimate();
  </script>
</body>
</html>
