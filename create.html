<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Token - Tempo Pump</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #090909;
      --bg-soft: #111211;
      --panel: #171917;
      --panel-2: #1d1f1d;
      --line: rgba(255,255,255,0.07);
      --text: #f2f5ef;
      --muted: #879082;
      --green: #8dff55;
      --green-soft: rgba(141,255,85,0.12);
      --green-line: rgba(141,255,85,0.18);
      --shadow: 0 18px 40px rgba(0,0,0,0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: "Manrope", sans-serif; color: var(--text);
      background: radial-gradient(circle at top left, rgba(141,255,85,0.05), transparent 24%), linear-gradient(180deg, #070807 0%, #0a0b0a 100%);
    }
    h1, h2, h3 { font-family: "Space Grotesk", sans-serif; letter-spacing: -0.03em; }
    .app { display: grid; grid-template-columns: 208px minmax(0, 1fr); min-height: 100vh; }
    .sidebar {
      position: sticky; top: 0; height: 100vh; padding: 18px 14px; background: rgba(10,11,10,0.95);
      border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; padding: 8px 8px 14px; font-family: "Space Grotesk", sans-serif;
      font-size: 24px; font-weight: 700;
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #acff84, #84ea4e); color: #071005;
    }
    .nav { display: grid; gap: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; min-height: 46px; padding: 0 12px; border-radius: 12px; color: #d9dfd5;
    }
    .nav-item.active { background: rgba(255,255,255,0.05); color: var(--green); }
    .nav-item:hover { background: rgba(255,255,255,0.04); }
    .nav-icon { width: 18px; text-align: center; }
    .nav-label { font-size: 15px; font-weight: 600; }
    .sidebar-foot {
      margin-top: auto; padding: 12px; border-radius: 14px; background: var(--panel); border: 1px solid var(--line);
    }
    .wallet-btn, .submit-btn {
      width: 100%; min-height: 44px; border: none; border-radius: 12px; background: linear-gradient(135deg, #acff84, #84ea4e);
      color: #081006; font-size: 14px; font-weight: 900; cursor: pointer;
    }
    .network-badge {
      display: none; margin-top: 10px; min-height: 34px; align-items: center; justify-content: center; border-radius: 10px;
      background: var(--green-soft); border: 1px solid var(--green-line); color: #c3ffab; font-size: 12px; font-weight: 700;
    }
    .network-badge.show { display: flex; }
    .main { min-width: 0; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 20px 0;
    }
    .pill {
      min-height: 40px; padding: 0 14px; border-radius: 999px; display: inline-flex; align-items: center; background: var(--panel);
      border: 1px solid var(--line); color: var(--text); font-size: 13px; font-weight: 700;
    }
    .page { padding: 18px 20px 28px; }
    .layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
    .panel {
      background: linear-gradient(180deg, var(--panel), #151615); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow);
    }
    .hero { padding: 24px; }
    .hero-kicker { color: var(--green); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; }
    .hero h1 { margin: 12px 0 10px; font-size: 46px; line-height: 0.96; }
    .hero p { color: var(--muted); font-size: 14px; line-height: 1.8; }
    .form-panel, .side-panel { padding: 18px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .section-title { font-size: 28px; font-weight: 700; }
    .mini-chip {
      display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; border-radius: 999px; background: var(--green-soft);
      border: 1px solid var(--green-line); color: var(--green); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .field-stack { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field label {
      display: block; margin-bottom: 8px; color: #96a391; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800;
    }
    .input, .textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px; background: var(--bg-soft); color: var(--text);
      padding: 13px 14px; font-size: 14px; outline: none;
    }
    .textarea { resize: vertical; min-height: 110px; }
    .image-box { display: flex; gap: 12px; padding: 12px; border-radius: 14px; background: var(--bg-soft); border: 1px solid var(--line); }
    .preview {
      width: 84px; height: 84px; border-radius: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #acff84, #84ea4e); color: #091007; font-size: 30px; font-weight: 900; overflow: hidden;
    }
    .upload-btn {
      width: 100%; min-height: 40px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.12); background: rgba(255,255,255,0.02);
      color: #e5ebe0; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .hint {
      margin-top: 14px; padding: 14px; border-radius: 12px; background: var(--bg-soft); border: 1px solid var(--line); color: var(--muted);
      font-size: 13px; line-height: 1.7;
    }
    .metric-list { display: grid; gap: 8px; }
    .metric-row {
      display: flex; justify-content: space-between; gap: 10px; min-height: 40px; padding: 0 12px; align-items: center; border-radius: 10px;
      background: var(--bg-soft); color: var(--muted); font-size: 13px;
    }
    .metric-row strong { color: var(--text); }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .page, .topbar { padding-left: 14px; padding-right: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
      .hero h1 { font-size: 38px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <span>TEMPO</span>
      </div>

      <nav class="nav">
        <a href="/" class="nav-item">
          <span class="nav-icon">⌂</span>
          <span class="nav-label">Home</span>
        </a>
        <a href="/tokens" class="nav-item">
          <span class="nav-icon">▦</span>
          <span class="nav-label">Tokens</span>
        </a>
        <a href="/rules" class="nav-item">
          <span class="nav-icon">≡</span>
          <span class="nav-label">Rules</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <button onclick="connectWallet()" id="connectBtn" class="wallet-btn">Connect Wallet</button>
        <div id="networkBadge" class="network-badge">Tempo Mainnet</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="pill">Create Token</div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="pill" id="walletPreview">Wallet not connected</div>
        </div>
      </div>

      <div class="page">
        <section class="layout">
          <div>
            <section class="panel hero">
              <div class="hero-kicker">Tempo Pump</div>
              <h1>Create Token</h1>
            </section>

            <section class="panel form-panel" style="margin-top:18px;">
              <div class="section-head">
                <div class="section-title">Create Form</div>
                <div class="mini-chip">Launch</div>
              </div>

              <div class="field-stack">
                <div class="field">
                  <label for="name">Token Name</label>
                  <input id="name" class="input" placeholder="Example: Tempo Sunset Club">
                </div>
                <div class="grid-2">
                  <div class="field">
                    <label for="symbol">Token Symbol</label>
                    <input id="symbol" class="input" placeholder="TSC">
                  </div>
                  <div class="field">
                    <label for="twitter">X / Twitter</label>
                    <input id="twitter" class="input" placeholder="@tempo">
                  </div>
                </div>
                <div class="field">
                  <label for="description">Description</label>
                  <textarea id="description" class="textarea" placeholder="Project description"></textarea>
                </div>
                <div class="field">
                  <label>Token Image</label>
                  <div class="image-box">
                    <div id="imagePreview" class="preview">🪙</div>
                    <div class="field-stack" style="flex:1;">
                      <label class="upload-btn">
                        Upload Image
                        <input type="file" id="imageFile" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                      </label>
                      <input id="image" class="input" placeholder="Image URL / Base64" oninput="previewImageUrl()">
                    </div>
                  </div>
                </div>
                <div class="field">
                  <label for="website">Website</label>
                  <input id="website" class="input" placeholder="https://your-project.site">
                </div>
                <button onclick="createLaunch()" class="submit-btn">Create Launch</button>
              </div>

              <div class="hint" id="resultBox"></div>
            </section>
          </div>

          <aside class="panel side-panel">
            <div class="metric-list">
              <div class="metric-row"><span>Settlement Token</span><strong>USDC</strong></div>
              <div class="metric-row"><span>Graduation Target</span><strong>12,000</strong></div>
              <div class="metric-row"><span>Protocol Fee</span><strong>1%</strong></div>
              <div class="metric-row"><span>Chain</span><strong>4217</strong></div>
            </div>
          </aside>
        </section>
      </div>
    </main>
  </div>

  <script>
    let provider, signer, userAddress;
    const LAUNCH_CONTRACT = "0x6C29C8D23600Fb0487436EEB8B22c082f59d9574";
    const LAUNCH_ABI = [
      "function createToken(string name, string symbol, string meta) returns (address)",
      "event LaunchCreated(address indexed token, address indexed creator, string name, string symbol, string meta)"
    ];
    const TEMPO_CHAIN = {
      chainId: "0x1079",
      chainName: "Tempo Mainnet",
      nativeCurrency: { name: "USD", symbol: "USD", decimals: 18 },
      rpcUrls: ["https://rpc.tempo.xyz"],
      blockExplorerUrls: ["https://explore.mainnet.tempo.xyz"]
    };

    async function autoConnect() {
      if (!window.ethereum) return;
      try {
        await connectWallet(false);
      } catch (e) {}
    }

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const base64 = ev.target.result;
        document.getElementById("image").value = base64;
        document.getElementById("imagePreview").innerHTML = `<img src="${base64}" class="w-full h-full object-cover">`;
      };
      reader.readAsDataURL(file);
    }

    function previewImageUrl() {
      const url = document.getElementById("image").value;
      const preview = document.getElementById("imagePreview");
      if (url && (url.startsWith("http") || url.startsWith("data:"))) {
        preview.innerHTML = `<img src="${url}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='🪙'">`;
      } else {
        preview.innerHTML = "🪙";
      }
    }

    async function connectWallet(requestAccess = true) {
      if (!window.ethereum) return setResult("Please install MetaMask or another EVM wallet.", true);
      try {
        const accounts = await window.ethereum.request({
          method: requestAccess ? "eth_requestAccounts" : "eth_accounts"
        });
        if (!accounts.length) return;
        const currentChainId = await window.ethereum.request({ method: "eth_chainId" });
        if (currentChainId !== TEMPO_CHAIN.chainId) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: TEMPO_CHAIN.chainId }]
            });
          } catch (switchErr) {
            if (switchErr.code === 4902) {
              await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [TEMPO_CHAIN]
              });
            } else {
              throw switchErr;
            }
          }
        }
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        document.getElementById("connectBtn").textContent = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("walletPreview").textContent = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("networkBadge").classList.add("show");
        setResult(`Wallet connected: ${userAddress}`);
      } catch (e) {
        setResult(`Connection failed: ${e.message}`, true);
      }
    }

    async function createLaunch() {
      const name = document.getElementById("name").value.trim();
      const symbol = document.getElementById("symbol").value.trim();
      const description = document.getElementById("description").value.trim();
      const image = document.getElementById("image").value.trim();
      const twitter = document.getElementById("twitter").value.trim();
      const website = document.getElementById("website").value.trim();
      if (!name || !symbol) return setResult("Please enter a token name and symbol.", true);
      if (!userAddress) return setResult("Please connect your wallet first.", true);
      try {
        const meta = JSON.stringify({ description, image, twitter, website });
        setResult(`Creating ${name} (${symbol})...`);
        const contract = new ethers.Contract(LAUNCH_CONTRACT, LAUNCH_ABI, signer);
        const tx = await contract.createToken(name, symbol, meta);
        setResult(`Transaction sent: ${tx.hash}`);
        const receipt = await tx.wait();
        const iface = new ethers.Interface(LAUNCH_ABI);
        let tokenAddr = "";
        for (const log2 of receipt.logs) {
          try {
            const parsed = iface.parseLog(log2);
            if (parsed.name === "LaunchCreated") tokenAddr = parsed.args.token;
          } catch (e) {}
        }
        if (tokenAddr) {
          try {
            localStorage.setItem(
              `tempo_meta_${tokenAddr.toLowerCase()}`,
              JSON.stringify({ description, image, twitter, website })
            );
          } catch (e) {}
        }
        setResult(`Launch created: ${tokenAddr || "Token address not found"}`);
      } catch (e) {
        setResult(`Creation failed: ${e.message}`, true);
      }
    }

    function setResult(message, isError = false) {
      const box = document.getElementById("resultBox");
      box.textContent = message;
      box.style.color = isError ? "#ffb0a9" : "#d9f5cb";
      box.style.borderColor = isError ? "rgba(255,140,120,0.16)" : "rgba(141,255,85,0.18)";
    }

    window.addEventListener("load", autoConnect);

    if (window.ethereum) {
      window.ethereum.on("accountsChanged", (accounts) => {
        if (accounts.length > 0) connectWallet(false);
        else {
          userAddress = null;
          signer = null;
          document.getElementById("connectBtn").textContent = "Connect Wallet";
          document.getElementById("walletPreview").textContent = "Wallet not connected";
          document.getElementById("networkBadge").classList.remove("show");
        }
      });
      window.ethereum.on("chainChanged", () => window.location.reload());
    }
  </script>
</body>
</html>
